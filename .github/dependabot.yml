version: 2
updates:
  # Keep SHA-pinned actions current — low noise, one grouped PR weekly.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
      timezone: "Etc/UTC"
    groups:
      actions:
        patterns:
          - "*"

  # npm: heavily limited — one grouped PR monthly, patch + security only. Ignore
  # majors AND minors (for 0.x deps like `eve`, a minor bump is effectively
  # breaking). npm security updates still flow regardless of this schedule.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      npm:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
